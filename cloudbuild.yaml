substitutions:
  _REGION: us-central1
  _AR_REPO: members-only-app
  _SERVICE_NAME: members-only-application
  _INSTANCE_CONNECTION: pet-projects-461723:us-central1:the-odin-project

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/pet-projects-461723/secrets/TOP-SQL-USER/versions/latest
      env: 'DB_USER'
    - versionName: projects/pet-projects-461723/secrets/TOP-SQL-PW/versions/latest
      env: 'DB_PASSWORD'

steps:
  # Migrate SQL files
  - name: postgres:alpine
    id: 'Run database migrations'
    entrypoint: sh
    secretEnv: ['DB_USER', 'DB_PASSWORD']
    args:
      - -c
      - |
        wget https://dl.google.com/cloudsql/cloud_sql_proxy.linux.amd64 -O cloud_sql_proxy
        chmod +x cloud_sql_proxy
        ./cloud_sql_proxy -instances=${_INSTANCE_CONNECTION}=tcp:5432 &

        sleep 5

        PGPASSWORD=$$DB_PASSWORD psql -h localhost -U $$DB_USER -d postgres -c "CREATE DATABASE members_only" 2>/dev/null || true
        PGPASSWORD=$$DB_PASSWORD psql -h localhost -U $$DB_USER -d members_only -f lib/db/populate.sql

  # Build artifact repo if doesn't exist
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: 'Create Artifact Registry repository'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud artifacts repositories describe ${_AR_REPO} \
          --location=${_REGION} || \
        gcloud artifacts repositories create ${_AR_REPO} \
          --repository-format=docker \
          --location=${_REGION} \
          --description="Docker repository for ${_SERVICE_NAME}"

  - name: gcr.io/cloud-builders/docker
    id: 'Build Docker image'
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest
      - .

  # Push both tags to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    id: 'Push image to Artifact Registry'
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: 'Deploy to Cloud Run'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=DB_DATABASE=members_only,INSTANCE_CONNECTION_NAME=${_INSTANCE_CONNECTION}
      - --set-secrets=DB_USER=TOP-SQL-USER:latest,DB_PASSWORD=TOP-SQL-PW:latest
      - --add-cloudsql-instances=${_INSTANCE_CONNECTION}

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest
